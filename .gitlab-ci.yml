default:
  before_script:
    - env
    - echo "${DOCKERHUB_TOKEN}" | docker login --username "${DOCKERHUB_USER}" --password-stdin

.retry-and-timeout: &retry-and-timeout
  retry:
    max: 2
    when:
    - job_execution_timeout
    - stuck_or_timeout_failure
    - api_failure
    - runner_system_failure
    - script_failure
    - unknown_failure
  timeout: 120 minutes

stages:
- build

Pegasus Docker Build Images:
  <<: *retry-and-timeout
  stage: build
  parallel:
    matrix:
    - OS:
      - alpine_3
      - suse_15
      - deb_11
      - deb_12
      - deb_13
      - rhel_8
      - rhel_9
      - rhel_10
      - ubuntu_22
      - ubuntu_24
      - ubuntu_26
  script:
  - cd ${OS}
  - docker buildx build --builder multiarch-builder --platform linux/amd64,linux/arm64 --tag pegasus/buildenv:${OS} --progress plain --push .
  tags:
  - docker-cli
  - docker-multiarch
  rules:
    - if: '$CI_PIPELINE_SOURCE == "1"'

ROOTLESS Pegasus Docker Build Images:
  <<: *retry-and-timeout
  stage: build
  parallel:
    matrix:
    - OS:
      - rhel_10
  image:
    name: moby/buildkit:rootless
    entrypoint: [""]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    IMAGE_NAME: docker.io/pegasus/buildenv:${OS}
  before_script:
    - mkdir -p ~/.docker
    - |
      echo "{
        \"auths\": {
          \"docker.io\": {
            \"username\": \"$DOCKERHUB_USER\",
            \"password\": \"$DOCKERHUB_TOKEN\"
          }
        }
      }" > ~/.docker/config.json
  script:
    - cd ${OS}
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context=. \
        --local dockerfile=. \
        --opt platform=linux/amd64,linux/arm64 \
        --output type=image,name=$IMAGE_NAME,push=true
  tags:
  - k8s
